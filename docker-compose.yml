version: '3.9'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: postaco_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postaco_user
      POSTGRES_PASSWORD: postaco_password
      POSTGRES_DB: postaco_db
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postaco_user"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: postaco_redis
    restart: unless-stopped
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Backend API
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: postaco_backend
    restart: unless-stopped
    environment:
      NODE_ENV: development
      PORT: 5000
      DATABASE_URL: postgresql://postaco_user:postaco_password@postgres:5432/postaco_db
      REDIS_URL: redis://redis:6379
      JWT_SECRET: dev-secret-key-change-in-production
      JWT_REFRESH_SECRET: dev-refresh-secret-key-change-in-production
      CORS_ORIGIN: "http://localhost:3000,http://localhost:3001,http://localhost:5000"
    ports:
      - "5000:5000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend/src:/app/src
      - ./backend/prisma:/app/prisma
    command: npm run dev
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:5000/health"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 15s

  # Frontend Web App (optional - can be run separately)
  # web:
  #   build:
  #     context: ./web-app
  #     dockerfile: Dockerfile
  #   container_name: postaco_web
  #   restart: unless-stopped
  #   ports:
  #     - "3000:80"
  #   depends_on:
  #     - backend
  #   environment:
  #     REACT_APP_API_URL: http://backend:5000

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local

networks:
  default:
    name: postaco_network
